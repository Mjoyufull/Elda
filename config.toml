# Elda sample `/etc/elda/config.toml`
#
# This file matches the `Config` shape in `crates/elda-core/src/config.rs`
# (`Config::load` reads `<root>/etc/elda/config.toml`). Copy sections you need
# into the real path; unknown top-level tables will make load fail.

# ===== DEFAULTS (`DefaultsConfig`) =====
[defaults]

remote = "yoka-main"
build_mode = "isolated"
prefix = "/usr"
allow_system_mode = false
snapshot_tool = "none"
install_recommends = true
refresh_weak_deps = false
install_preference = "binary"

# ===== PRIVILEGE (`PrivilegeConfig`) =====
[privilege]

# One of: `auto`, `doas`, `sudo`, `run0`, `su`, `none`
provider = "auto"
preserve_env = false
interactive = true

# ===== PROFILE (`ProfileConfig`) =====
[profile]

base = "yoka-core"
native_arch = "amd64"
foreign_arches = ["i386"]
init = "dinit"

# ===== RESOLVER (`ResolverConfig`) =====
[resolver.provider_preferences]
# gl-provider = ["mesa-provider", "zink-provider"]

# ===== FLAGS (`FlagsConfig`) =====
[flags.global]
wayland = true
x11 = false

[flags.profile.yoka-desktop-hyprland]
pipewire = true

[flags.package.fsel]
wayland = true

# ===== LOGGING (`LoggingConfig`) =====
# `dir`: `~/` under live root `/` expands to the invoking user's config area
# when `elda` runs as root via sudo/doas (`SUDO_UID` / `SUDO_USER` / `DOAS_USER`);
# otherwise `XDG_CONFIG_HOME` or `$HOME/.config`.
# `level`: 0 = no per-run session log file; 1–3 = increasing detail on mutating commands.
[logging]
dir = "~/.config/elda/logs"
level = 0

# ===== SUBMISSION (`SubmissionConfig`) =====
[submission]
mode = "pr"
auto_open = true
auto_assign = false
auth = "none"
token_env = ""
# api_base = "https://api.github.com"
remote_name = "origin"
base_branch = "main"

# Optional per-remote overrides live under `[submission.remotes.<name>]` as
# `SubmissionRemoteConfig` (`auto_open`, `auto_assign`, `auth`, `token_env`,
# `api_base`, `base_branch`).

